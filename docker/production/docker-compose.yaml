version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sgforge-db-sanket
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: change_me_db_password
      POSTGRES_DB: org_db
    ports:
      - "5433:5432"
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d org_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - db-core-net
      - db-expenses-net
      - db-go-net

  app:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    container_name: sgforge-app-sanket-v3-prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://lifeos:change_me_db_password@db:5432/org_db
      - DATABASE_READONLY_URL=postgres://lifeos:change_me_db_password@db:5432/org_db
      - PORTAL_URL=http://localhost:3001
      - PORT=3001
      - NODE_ENV=production
      - WATCHPACK_POLLING=false
      - RUNNING_IN_DOCKER=true
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Note: No host volumes are mounted in production to ensure total container isolation and run solely from precompiled artifacts.
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - db-core-net
      - portal-net
      - sgforge-network

  reference-expenses:
    build:
      context: ../../sandbox/apps/reference-expenses
      dockerfile: Dockerfile
    container_name: reference-expenses
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://app_reference_expenses:change_me_expenses_password@db:5432/org_db
      - PORT=8085
      - PORTAL_URL=http://app:3001
      - CLIENT_ID=client_reference_expenses
      - CLIENT_SECRET=secret_reference_expenses_dev_key
    ports:
      - "8085:8085"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - db-expenses-net
      - portal-net
    restart: always

  reference-go:
    build:
      context: ../../sandbox/apps/reference-go
      dockerfile: Dockerfile
    container_name: reference-go
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://app_reference_go:change_me_go_password@db:5432/org_db
      - PORT=8086
      - PORTAL_URL=http://app:3001
      - CLIENT_ID=client_reference_go
      - CLIENT_SECRET=secret_reference_go_dev_key
    ports:
      - "8086:8086"
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - db-go-net
      - portal-net
    restart: always

  reference-python:
    build:
      context: ../../sandbox/apps/reference-python
      dockerfile: Dockerfile
    container_name: reference-python
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://app_reference_python:change_me_python_password@db:5432/org_db
      - PORT=8087
      - PORTAL_URL=http://app:3001
      - CLIENT_ID=client_reference_python
      - CLIENT_SECRET=secret_reference_python_dev_key
    ports:
      - "8087:8087"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - portal-net
    restart: always

  telemetry-dashboard:
    build:
      context: ../../sandbox/apps/telemetry-dashboard
      dockerfile: Dockerfile
    container_name: telemetry-dashboard
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PORT=8080
      - PORTAL_URL=http://app:3001
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - portal-net
    restart: always

networks:
  sgforge-network:
    name: sgforge-network
    external: true
  portal-net:
    name: sgforge-portal-net
  db-core-net:
    name: sgforge-db-core-net
  db-expenses-net:
    name: sgforge-db-expenses-net
  db-go-net:
    name: sgforge-db-go-net

volumes:
  pgdata:
