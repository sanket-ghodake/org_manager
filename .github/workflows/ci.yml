name: SG Forge CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  toolchain-validation:
    name: Dockerized Toolchain Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Network
        run: docker network create sgforge-network || true

      - name: Build Toolchain Image
        run: docker compose -f toolchain/docker-compose.yml build toolchain

      - name: Run Lint & Architecture Validation
        run: docker compose -f toolchain/docker-compose.yml run --rm lint

      - name: Run Security Audits
        run: docker compose -f toolchain/docker-compose.yml run --rm security

      - name: Start Database Container
        run: |
          docker compose -f docker/development/docker-compose.yaml up -d db
          # Wait for database healthcheck
          until docker exec sgforge-db-sanket pg_isready -U lifeos -d org_db; do
            echo "Waiting for database..."
            sleep 1
          done
          echo "Database is ready!"

      - name: Run Unit & Integration Tests
        run: docker compose -f toolchain/docker-compose.yml run --rm test

      - name: Build Documentation (MkDocs)
        run: docker compose -f toolchain/docker-compose.yml run --rm docs

      - name: Clean up Containers
        if: always()
        run: |
          docker compose -f toolchain/docker-compose.yml down -v || true
          docker compose -f docker/development/docker-compose.yaml down -v || true
