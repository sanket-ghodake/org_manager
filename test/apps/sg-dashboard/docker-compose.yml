version: '3.8'

services:
  sg-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sg-dashboard
    ports:
      - "8095:8095"
    environment:
      - DATABASE_URL=file:/app/db/local.db
      - PORT=8095
      - PORTAL_INTERNAL_URL=http://app:3001
      - CLIENT_ID=client_sg_dashboard
      - CLIENT_SECRET=secret_sg_dashboard
      - JWT_SECRET=super_secret_dashboard_jwt_key
    volumes:
      - sg-dashboard-db:/app/db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

networks:
  default:
    name: sgforge-network
    external: true

volumes:
  sg-dashboard-db:
