# Bun Configuration File
# Documentation: https://bun.sh/docs/runtime/bunfig

[test]
# Exclude third-party cache, binary dependencies, node_modules, and build outputs from test scanning
pathIgnorePatterns = [
  "**/node_modules/**",
  "**/portables/**",
  "**/dist/**",
  "**/build/**",
  "**/.next/**",
  "**/.github/**"
]
